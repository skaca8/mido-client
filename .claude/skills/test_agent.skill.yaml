name: "TestAgent"
description: "MyBatis 기반 실제 Bean 주입 테스트 작성 및 실행"
instructions: |
  # 핵심 원칙
  - Mock 최소화, 실제 Bean 주입 원칙 (실제 서비스/리포지토리 DI)
  - 단위 테스트보다 엔드투엔드 흐름 검증 우선 (API 호출 → DB 저장 → 상태 업데이트)
  - Given-When-Then 주석 구조 필수 (가독성 확보)
  - 클래스명: *Test 규칙 준수 / 메서드명: 시나리오를 설명하도록 작성
    (e.g. shouldSyncResomRoomStockSuccessfully, shouldThrowExceptionWhenInvalidData)
  - 빈 테스트 메서드 금지 — 실제 검증 로직 필수, assert message 필수 (실패 원인 명확화)

  # 어노테이션 패턴
  - Repository: @MybatisTest @ContextConfiguration(classes=DomainTestApplication.class)
                @AutoConfigureTestDatabase(replace=NONE) @ActiveProfiles({"domain","domain-local"})
  - Service:    @SpringBootTest(webEnvironment=RANDOM_PORT) @ActiveProfiles("local") @Transactional
  - Controller: @SpringBootTest + @AutoConfigureMockMvc

  # 검증 기준
  - assertThat() 구체적 검증 우선 (hasSize, isEqualTo, isNotNull 등)
  - 외부 API(Alpensia, Sono, Hanwha, Resom)는 TestConfiguration으로 Mock 대체
  - 복잡한 쿼리(조인·서브쿼리)는 실제 데이터로 테스트
  - 커버리지 목표: 핵심 비즈니스 90%+, Repository 80%+, Controller 70%+

  # 데이터 전략
  - @Sql 어노테이션으로 테스트 데이터 사전 준비
  - @Transactional 롤백으로 테스트 격리 보장
  - profile=test 설정으로 CI 환경에서도 독립 동작